$kind: http-request
url: "{{baseUrl}}/v2"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      })

      pm.test('Response time is below 3000ms', function () {
          pm.expect(pm.response.responseTime).to.be.below(3000);
      })

      pm.test('Response body is not empty', function () {
          pm.expect(pm.response.text()).to.not.be.empty;
      })

      pm.test('Content-Type header is present', function () {
          pm.expect(pm.response.headers.get('Content-Type')).to.exist;
      })

      pm.test('Response is valid JSON', function () {
          pm.response.to.be.json;
      })

      pm.test('Response body contains version-related fields', function () {
          const jsonData = pm.response.json();
          const versionFields = [
              'version',
              'id',
              'status',
              'updated',
              'links'
          ];
          const target = jsonData && typeof jsonData === 'object' && jsonData.version ? jsonData.version : jsonData;
          const hasVersionField = versionFields.some(function (field) {
              return target.hasOwnProperty(field);
          });
          pm.expect(hasVersionField).to.be.true;
      })
    language: text/javascript
examples: ./.resources/Show API version details.resources/examples
order: 1000
