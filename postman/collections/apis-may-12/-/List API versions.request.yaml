$kind: http-request
url: "{{baseUrl}}/"
method: GET
headers:
  Accept: application/json
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      })

      pm.test('Response time is below 3000ms', function () {
          pm.expect(pm.response.responseTime).to.be.below(3000);
      })

      pm.test('Response body is not empty', function () {
          pm.expect(pm.response.text()).to.not.be.empty;
      })

      pm.test('Content-Type header is present', function () {
          pm.expect(pm.response.headers.get('Content-Type')).to.exist;
      })

      pm.test('Response is valid JSON', function () {
          pm.response.to.be.json;
      })

      pm.test('Response body contains a list/array structure', function () {
          const jsonData = pm.response.json();
          const isArray = Array.isArray(jsonData);
          const hasVersionsArray = typeof jsonData === 'object' && jsonData !== null && Object.values(jsonData).some(function (val) {
              return Array.isArray(val);
          });
          pm.expect(isArray || hasVersionsArray).to.be.true;
      })
    language: text/javascript
examples: ./.resources/List API versions.resources/examples
order: 1000
