$kind: http-example
request:
  url: "{{baseUrl}}/"
  method: GET
  headers:
    Accept: application/json
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
          response: "not found error"
      }
order: 3000
